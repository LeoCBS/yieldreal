<svg width="280" height="60" viewBox="0 0 280 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .yield {
        fill: #e5e7eb;
        font-weight: 800;
        letter-spacing: 1.5px;
      }
      .real {
        fill: #fbbf24;
        font-weight: 800;
        letter-spacing: 1.5px;
      }
    </style>
  </defs>

  <!-- YIELD -->
  <text x="0" y="42"
        font-family="Inter, Helvetica, Arial, sans-serif"
        font-size="34"
        class="yield">
    YIELD
  </text>

  <!-- REAL mais próximo -->
  <text x="135" y="42"
        font-family="Inter, Helvetica, Arial, sans-serif"
        font-size="34"
        class="real">
    REAL
  </text>

  <!-- detalhe no Y (melhor posicionado) -->
  <polygon points="6,8 16,8 11,22" fill="#fbbf24"/>
</svg>